# ─────────────────────────────────────────────────────────────────────────────
#  Generate the contribution-snake animation used in the profile README.
#
#  WHERE THIS GOES:
#    This file belongs in your PROFILE repo (the one named  sanjucoder-96 ),
#    at the path  .github/workflows/snake.yml
#
#  HOW IT WORKS:
#    On a schedule (and on demand), it reads your contribution graph, renders
#    two SVGs (light + dark, in your ember accent), and pushes them to a branch
#    called "output". The README references those files by their raw URL.
#
#  FIRST RUN:
#    Pushing this file to `main` triggers the workflow automatically and creates
#    the "output" branch — so the snake stops 404-ing in your README on its own.
#    Want it sooner? Actions tab → "Generate Snake Animation" → "Run workflow".
# ─────────────────────────────────────────────────────────────────────────────
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write             # required to push the generated SVGs

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          # Ember-tinted to match the README/portfolio brand.
          outputs: |
            dist/github-snake.svg?color_snake=#c2472e&color_dots=#ebe4d8,#f3c3b2,#e08a6f,#c2472e,#8f2f1c
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#e0653f

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
