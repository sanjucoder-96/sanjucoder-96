  <text x="600" y="162" text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="500" fill="#EAF6FF" opacity="0.95">Computer Science Student &#8226; Java &amp; Python &#8226; Building in the open</text>
